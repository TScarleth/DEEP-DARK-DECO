<app-navbar></app-navbar>

@if (category(); as currentCategory) {
  <div class="category-shell">
    <header class="page-heading">
      <p class="breadcrumb">{{ currentCategory.breadcrumb }}</p>

      <div class="page-heading-row">
        <h1 class="category-title">{{ currentCategory.title }}</h1>

        <a routerLink="/" class="back-btn">
          Volver al inicio
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
          </svg>
        </a>
      </div>
    </header>

    <div class="category-products">
      @for (product of products(); track product.id) {
        <div class="product-card">
          <img [src]="product.imagen" [alt]="product.nombre" />
          <div class="product-info">
            <h3>{{ product.nombre }}</h3>
            <p class="desc">{{ product.descripcion }}</p>
            <div class="price-block">
              @if (product.oldPrice) {
                <p class="old-price">{{ product.oldPrice }}</p>
              }
              <p class="price">{{ product.precio }}</p>
            </div>
            <button
              type="button"
              class="product-btn"
              (click)="onAddToCartClick($event, product)"
              (keyup)="onAddToCartKeyup($event, product)"
            >
              {{ addedProduct() === product.id ? 'AGREGADO' : 'AÑADIR AL CARRITO' }}
            </button>
          </div>
        </div>
      }
    </div>
  </div>

  <app-footer></app-footer>
}
