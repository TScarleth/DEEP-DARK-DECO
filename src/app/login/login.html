<div class="auth-page">
  <div class="auth-panel">
    <h3>Iniciar Sesión</h3>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" (keyup)="onFormKeyup($event)" novalidate>
      <div class="auth-field">
        <label for="correo">Correo</label>
        <input
          type="email"
          class="auth-input"
          id="correo"
          formControlName="correo"
          autocomplete="username"
          maxlength="60"
          (input)="onCorreoInput($event)"
          [class.is-invalid]="isInvalid('correo')"
        />
        <div class="auth-error">{{ getError('correo') }}</div>
      </div>

      <div class="auth-field">
        <label for="password">Contraseña</label>
        <input
          type="password"
          class="auth-input"
          id="password"
          formControlName="password"
          autocomplete="current-password"
          maxlength="18"
          (input)="onPasswordInput($event)"
          [class.is-invalid]="isInvalid('password')"
        />
        <div class="auth-error">{{ getError('password') }}</div>
      </div>

      <button type="submit" class="product-btn auth-submit">Entrar</button>
    </form>

    <div class="auth-links">
      <a routerLink="/register">Crear cuenta</a> |
      <a routerLink="/recover">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
</div>
